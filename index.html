<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sâm Lốc Online</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app"><h1>Sâm Lốc Online (2 người)</h1>
<div class="actions">
<input id="name" placeholder="Tên của bạn" />
<button id="create">Tạo phòng</button>
<input id="code" placeholder="Mã phòng" />
<button id="join">Vào phòng</button>
<button id="start">Bắt đầu</button>
</div>
<p id="room"></p><p id="status"></p>
<div class="table"><div id="opp" class="player"></div><div class="pile"><div id="last"></div></div><div id="me" class="player"></div></div>
<div class="actions"><button id="play">Đánh</button><button id="pass">Bỏ lượt</button></div>
<div id="log" class="history"></div>
</div><script src="app.js"></script></body></html>
